<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daftar — AiratuKL</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/register.css"></head><body><main class="auth-shell"><aside class="auth-art"><a class="brand"><span class="brand-mark">A</span>AiratuKL</a><div><h1>Mulai perjalananmu.</h1><p class="opacity-75">Buka reward, frame premium, dan komunitas baru.</p></div></aside><section class="auth-panel"><div class="auth-card glass my-4"><h2>Buat akun</h2><p class="muted">Gratis dan hanya butuh satu menit.</p><button id="googleRegister" type="button" class="social-btn mb-3"><i class="fa-brands fa-google me-2"></i> Daftar dengan Google</button><div class="divider">atau isi data berikut</div><form id="registerForm"><div class="row g-3"><div class="col-md-6"><label class="form-label">Nama lengkap</label><input class="form-control" name="name" required></div><div class="col-md-6"><label class="form-label">Username</label><input class="form-control" name="username" pattern="[a-zA-Z0-9_]{3,20}" required></div><div class="col-12"><label class="form-label">Email</label><input class="form-control" name="email" type="email" required></div><div class="col-12"><label class="form-label">Nomor HP</label><input class="form-control" name="phone" type="tel" required></div><div class="col-md-6"><label class="form-label">Password</label><input class="form-control" name="password" type="password" minlength="6" required></div><div class="col-md-6"><label class="form-label">Konfirmasi</label><input class="form-control" name="confirm" type="password" required></div><div class="col-md-6"><label class="form-label">Tanggal lahir</label><input class="form-control" name="birthdate" type="date"></div><div class="col-md-6"><label class="form-label">Jenis kelamin</label><select class="form-select" name="gender"><option>Perempuan</option><option>Laki-laki</option><option>Lainnya</option></select></div><div class="col-12"><label class="form-label">Foto profil</label><input class="form-control" name="photo" type="file" accept="image/*"></div><div class="col-12"><label class="form-label">Status</label><input class="form-control" name="status" value="Hai, saya baru di AiratuKL!"></div></div><button class="btn btn-brand w-100 mt-4">Daftar sekarang</button></form><p class="text-center muted mt-3">Sudah punya akun? <a class="text-primary fw-bold" href="login.html">Masuk</a></p></div></section></main><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script><script src="js/firebase.js"></script><script src="js/app.js"></script><script src="js/register.js"></script></body></html>
