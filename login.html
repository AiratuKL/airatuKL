<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Masuk — AiratuKL</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/login.css"></head><body><main class="auth-shell"><aside class="auth-art"><a class="brand"><span class="brand-mark"><i class="fa-solid fa-paper-plane"></i></span>AiratuKL</a><div><h1>Kembali ke percakapanmu.</h1><p class="opacity-75">Pesan, bermain, dan tumbuh bersama komunitasmu.</p></div><small class="opacity-50">© 2026 AiratuKL</small></aside><section class="auth-panel"><div class="auth-card glass"><div class="d-flex justify-content-between"><div><h2>Selamat datang</h2><p class="muted">Masuk untuk melanjutkan</p></div><button class="icon-btn" data-theme-toggle><i class="fa-solid fa-moon"></i></button></div><button id="googleLogin" class="social-btn mt-3"><i class="fa-brands fa-google me-2"></i> Lanjutkan dengan Google</button><button id="phoneBtn" class="social-btn mt-2"><i class="fa-solid fa-mobile-screen me-2"></i> Masuk dengan nomor HP</button><div class="otp-box"><input id="phoneNumber" class="form-control mb-2" type="tel" placeholder="+628123456789"><div id="recaptcha-container" class="mb-2"></div><button id="sendOtp" type="button" class="btn btn-brand w-100">Kirim kode OTP</button><div id="otpConfirm" class="d-none mt-2"><input id="otpCode" class="form-control mb-2" inputmode="numeric" maxlength="6" placeholder="6 digit kode OTP"><button id="verifyOtp" type="button" class="btn btn-brand w-100">Verifikasi & masuk</button></div></div><div class="divider">atau dengan email</div><form id="loginForm"><label class="form-label">Email</label><input class="form-control mb-3" name="email" type="email" required placeholder="nama@email.com"><div class="d-flex justify-content-between"><label class="form-label">Password</label><a class="small text-primary" href="#">Lupa password?</a></div><input class="form-control mb-3" name="password" type="password" required minlength="6"><button class="btn btn-brand w-100" type="submit">Masuk</button></form><p class="text-center muted mt-4 mb-0">Belum punya akun? <a class="text-primary fw-bold" href="register.html">Daftar</a></p></div></section></main><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="js/firebase.js"></script><script src="js/app.js"></script><script src="js/login.js"></script></body></html>
